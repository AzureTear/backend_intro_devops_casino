services:
  frontend:
    image: casino-frontend:dev
    environment:
      - BACKEND_HOST=172.31.34.73
    ports:
      - "80:8080"

  db:
    image: postgres:16
    container_name: casino-db
    environment:
      POSTGRES_USER: casino
      POSTGRES_PASSWORD: casino123
      POSTGRES_DB: casino_db
    ports:
      - "5432:5432"
    volumes:
      - casino_pgdata:/var/lib/postgresql/data

volumes:
  casino_pgdata: