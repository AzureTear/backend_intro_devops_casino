apiVersion: apps/v1
kind: Deployment
metadata:
  name: casino-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: casino-backend
  template:
    metadata:
      labels:
        app: casino-backend
    spec:
      containers:
      - name: casino-backend
        image: 742075245664.dkr.ecr.us-east-1.amazonaws.com/casino-backend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: casino-secrets
        livenessProbe:
          httpGet:
            path: /livez
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 5
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: casino-backend
spec:
  selector:
    app: casino-backend
  ports:
  - port: 3000
    targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: casino-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: casino-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50